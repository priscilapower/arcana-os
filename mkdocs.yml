site_name: Arcana OS
site_description: The OS that gives your agents a soul.
site_author: Arcana OS
site_url: https://docs.arcanaos.cloud
repo_url: https://github.com/priscilapower/arcana-os
repo_name: priscilapower/arcana-os
copyright: arcanum — secret, mystery

# Docs live in the OSS repo alongside the code they document.
docs_dir: docs

theme:
  name: material
  language: en
  custom_dir: overrides
  logo: assets/arcana-mark-cyan.svg
  favicon: assets/favicon.svg
  font:
    text: DM Sans
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  # Dark-first, light-capable — matches the Arcana brand book.
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/arcana.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - mkdocs-typer2
  - mkdocstrings:
      handlers:
        python:
          paths:
            - packages/arcana-core
            - packages/arcana-cli
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            separate_signature: true
            signature_crossrefs: true
            merge_init_into_class: true
            members_order: source
            filters:
              - "!^_"

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - The 22 Major Arcana: cards.md
  - CLI reference: cli.md
  - API reference:
      - Overview: api/index.md
      - Agent: api/agent.md
      - Cards: api/cards.md
      - Models: api/models.md
