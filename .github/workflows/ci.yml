name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run pyright packages/arcana-core/arcana

      - name: Unit tests — arcana-core
        run: uv run pytest packages/arcana-core/tests/ -v -m "not llm_eval"

      - name: Unit tests — arcana-cli
        run: uv run pytest packages/arcana-cli/tests/ -v -m "not llm_eval"

