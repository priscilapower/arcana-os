name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-packages --all-extras

      - name: Lint
        run: uv run ruff check .

      - name: Type check - arcana-core
        run: uv run pyright packages/arcana-core/arcana

      - name: Type check - arcana-cli
        run: uv run pyright packages/arcana-cli/arcana_cli

      - name: Unit tests — arcana-core
        run: uv run pytest packages/arcana-core/tests/ -v -m "not llm_eval"

      - name: Unit tests — arcana-cli
        run: uv run pytest packages/arcana-cli/tests/ -v -m "not llm_eval"

  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify every commit is signed off
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          missing=0
          for sha in $(git rev-list --no-merges "$base".."$head"); do
            if ! git show -s --format=%B "$sha" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::Commit $sha is missing a 'Signed-off-by' line (DCO)."
              git show -s --format='  %h %s' "$sha"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "All commits must be signed off. Use 'git commit -s', or sign off existing commits with 'git rebase --signoff $base'."
            exit 1
          fi
          echo "All commits are signed off. ✅"
