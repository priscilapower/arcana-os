[project]
name = "arcana-cli"
version = "0.1.0"
description = "The OS that gives your agents a soul — CLI"
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
license-files = ["LICENSE", "NOTICE"]
keywords = ["ai", "agents", "llm", "tarot", "cli"]

dependencies = [
    "arcana-core>=0.1.0",
    "typer>=0.12.0",
    "rich>=13.7.0",
    "readchar>=4.2.2",
]

[project.scripts]
arcana = "arcana_cli.main:app"

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["arcana_cli"]
