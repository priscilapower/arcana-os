[project]
name = "arcana-core"
version = "0.1.0"
description = "The OS that gives your agents a soul — core library"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
keywords = ["ai", "agents", "llm", "tarot", "mcp", "ollama"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "pydantic>=2.7.0",
    "pydantic-settings>=2.3.0",
    "aiosqlite>=0.20.0",
    "httpx>=0.27.0",
    "keyring>=25.0.0",
    "anthropic>=0.28.0",
    "openai>=1.30.0",
    "mcp>=1.0.0",
    "rich>=13.7.0",
]

[project.optional-dependencies]
vector = ["sqlite-vec>=0.1.0"]
obsidian = ["watchdog>=4.0.0"]
qdrant = ["qdrant-client>=1.9.0"]
all = ["arcana-core[vector,obsidian,qdrant]"]

[tool.uv]
dependencies-group.dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["arcana"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--cov=arcana --cov-report=term-missing"
